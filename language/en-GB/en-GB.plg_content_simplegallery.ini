PLG_CONTENT_SIMPLEGALLERY="Content - Simple Gallery (by Frank Willeke)"
PLG_CONTENT_SIMPLEGALLERY_XML_DESCRIPTION="<p>Replaces <code>{simplegallery ...}</code> tags in content with a thumbnail gallery linked to the full-size images.</p><p>The tag has the following syntax: <code>{simplegallery folder='path/to/images' [columns='3'] [width='150'] [height='150'] [show_captions] [layout='grid|slider'] [sort='filename|date|random'] [sort_order='ascending|descending']}</code></p><p>The attribute <code>folder</code> is required, all others are optional.</p><p>Example: <code>{simplegallery folder='images/mygallery' columns='4' width='280' height='210' showcaptions layout='slider' sort='date' sort_order='descending'}</code></p>"

PLG_CONTENT_SIMPLEGALLERY_COLUMNS_LABEL="Columns"
PLG_CONTENT_SIMPLEGALLERY_COLUMNS_DESC="Default number of thumbnail columns if not overridden in the tag."

PLG_CONTENT_SIMPLEGALLERY_THUMB_WIDTH_LABEL="Thumbnail width"
PLG_CONTENT_SIMPLEGALLERY_THUMB_WIDTH_DESC="Default maximum width of generated thumbnails in pixels if not overridden in the tag."

PLG_CONTENT_SIMPLEGALLERY_THUMB_HEIGHT_LABEL="Thumbnail height"
PLG_CONTENT_SIMPLEGALLERY_THUMB_HEIGHT_DESC="Maximum height of generated thumbnails in pixels."

PLG_CONTENT_SIMPLEGALLERY_SHOW_CAPTIONS_LABEL="Show captions"
PLG_CONTENT_SIMPLEGALLERY_SHOW_CAPTIONS_DESC="Whether image captions should be shown by default if not overridden in the tag."

PLG_CONTENT_SIMPLEGALLERY_LAYOUT_LABEL="Layout"
