PLG_CONTENT_SIMPLEGALLERY_LAYOUT_GRID="Grid"
PLG_CONTENT_SIMPLEGALLERY_LAYOUT_SLIDER="Slider"

PLG_CONTENT_SIMPLEGALLERY_SORT_LABEL="Sort by"
