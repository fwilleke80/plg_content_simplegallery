PLG_CONTENT_SIMPLEGALLERY="Inhalt - Simple Gallery (von Frank Willeke)"
PLG_CONTENT_SIMPLEGALLERY_XML_DESCRIPTION="<p>Ersetzt <code>{simplegallery ...}</code> Tags in Content-Objekten mit einer Thumbnail-Galerie, die mit den Vollbildbildern verlinkt ist.</p><p>Der Tag hat die folgende Syntax: <code>{simplegallery folder='ordner/mit/bildern' [columns='3'] [width='150'] [height='150'] [show_captions] [layout='grid|slider'] [sort='filename|date|random'] [sort_order='ascending|descending']}</code></p><p>Das Attribut <code>folder</code> ist erforderlich, alle anderen sind optional.</p><p>Beispiel: <code>{simplegallery folder='images/mygallery' columns='4' width='280' height='210' showcaptions layout='slider' sort='date' sort_order='descending'}</code></p>"